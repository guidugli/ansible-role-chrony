---
# tasks/main.yml — guidugli.chrony
# Purpose: Validate inputs, install chrony, render configuration, and (optionally) manage service.

- name: Validate role inputs
  block:
    - name: Include validate.yml (optional extra validations)
      ansible.builtin.import_tasks: validate.yml

    - name: Include validate_extra.yml (regex & cross-field rules)
      ansible.builtin.import_tasks: validate_extra.yml
  tags: [validate]

# ---- Package cache management (APT only) ----
# On Debian/Ubuntu, package installs may fail if apt cache is stale or missing.
# Use ansible.builtin.apt update_cache + cache_valid_time for efficient, idempotent refresh.
# [1](https://docs.ansible.com/projects/ansible/latest/collections/ansible/builtin/apt_module.html)
- name: Update apt package cache (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: true
  when: ansible_facts['pkg_mgr'] | default('') == 'apt'
  tags: [install]

# ---- Package installation ----
- name: Install chrony packages
  ansible.builtin.package:
    name: "{{ chrony_packages }}"
    state: present
  tags: [install]

# ---- Facts / versioning ----
- name: Gather package facts
  ansible.builtin.package_facts:
    manager: auto
  tags: [facts]

- name: Determine chrony package name for version lookup
  ansible.builtin.set_fact:
    _chrony_pkg_name: >-
      {{
        (chrony_packages if chrony_packages is string else (chrony_packages | first))
      }}
  tags: [facts]

- name: Set chrony major version (best-effort)
  ansible.builtin.set_fact:
    chrony_major_version: >-
      {{
        (ansible_facts.packages[_chrony_pkg_name][0].version | split('.') | first | int)
      }}
  when:
    - ansible_facts.packages is defined
    - _chrony_pkg_name in ansible_facts.packages
    - ansible_facts.packages[_chrony_pkg_name] | length > 0
    - ansible_facts.packages[_chrony_pkg_name][0].version is defined
  tags: [facts]

- name: Debug installed chrony version (optional)
  ansible.builtin.debug:
    msg:
      - "Package name: {{ _chrony_pkg_name }}"
      - "Major version: {{ chrony_major_version | default('unknown') }}"
      - "Version string: {{ (ansible_facts.packages[_chrony_pkg_name][0].version
        if (_chrony_pkg_name in ansible_facts.packages) else 'unknown') }}"
  when: chrony_debug | default(false) | bool
  changed_when: false
  tags: [debug]

# ---- Config layout detection ----
- name: Check config layout directories
  block:
    - name: Check if conf.d directory exists
      ansible.builtin.stat:
        path: "{{ chrony_etc_path }}/conf.d"
      register: ch_conf_d

    - name: Check if sources.d directory exists
      ansible.builtin.stat:
        path: "{{ chrony_etc_path }}/sources.d"
      register: ch_sources_d

    - name: Set layout flags
      ansible.builtin.set_fact:
        chrony_conf_dir_exists: "{{ ch_conf_d.stat.exists | default(false) and ch_conf_d.stat.isdir | default(false) }}"
        chrony_sources_dir_exists: "{{ ch_sources_d.stat.exists | default(false) and ch_sources_d.stat.isdir |
          default(false) }}"
  tags: [config]

- name: Debug layout flags (optional)
  ansible.builtin.debug:
    msg:
      - "chrony_conf_dir_exists: {{ chrony_conf_dir_exists }}"
      - "chrony_sources_dir_exists: {{ chrony_sources_dir_exists }}"
  when: chrony_debug | default(false) | bool
  changed_when: false
  tags: [debug]

# ---- Render configuration ----
- name: Render main chrony configuration
  vars:
    # Select template source based on packaging layout, but always write to chrony.conf (the file chronyd reads).
    _template_src: "{{ 'chrony_with_conf_d.conf' if chrony_conf_dir_exists else 'chrony.conf' }}"
    _config_dest: "{{ chrony_etc_path }}/chrony.conf"
  ansible.builtin.template:
    src: "{{ _template_src }}"
    dest: "{{ _config_dest }}"
    mode: "{{ chrony_cfg_mode }}"
    force: true
    backup: true
  notify: Restart service
  tags: [config]

- name: Render conf.d settings (if supported)
  ansible.builtin.template:
    src: conf_d_settings.conf
    dest: "{{ chrony_etc_path }}/conf.d/01-ansible.conf"
    mode: "{{ chrony_cfg_mode }}"
    force: true
    backup: true
  when: chrony_conf_dir_exists
  notify: Restart service
  tags: [config]

- name: Render sources.d settings (if supported)
  ansible.builtin.template:
    src: sources_d_settings.conf
    dest: "{{ chrony_etc_path }}/sources.d/01-ansible.sources"
    mode: "{{ chrony_cfg_mode }}"
    force: true
    backup: true
  when: chrony_sources_dir_exists
  notify: Restart service
  tags: [config]

# ---- Service management ----
# Skip in containers and allow opt-out for container-based tests or immutable images.
- name: Manage chrony service (skip in containers or when disabled)
  vars:
    _virt_type: "{{ ansible_facts['virtualization_type'] | default('') }}"
    _is_container: "{{ _virt_type in (_container_types | default([])) }}"
  ansible.builtin.service:
    name: "{{ chrony_service }}"
    state: started
    enabled: true
  when:
    - chrony_manage_service | default(true) | bool
    - not _is_container
  tags: [service]
