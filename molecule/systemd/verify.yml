---
- name: Verify systemd is running
  hosts: molecule
  gather_facts: false
  become: false

  tasks:
    - name: Confirm PID 1 command name (no ps dependency)
      ansible.builtin.raw: "cat /proc/1/comm"
      register: pid1_comm
      changed_when: false

    - name: Assert PID 1 is systemd
      ansible.builtin.assert:
        that:
          - (pid1_comm.stdout | trim) == "systemd"
        fail_msg: "PID 1 is not systemd. Got: {{ pid1_comm.stdout | trim }}"
        quiet: true

    - name: Check systemctl is usable
      ansible.builtin.command:
        argv:
          - systemctl
          - is-system-running
          - --no-pager
      register: sysd
      changed_when: false
      failed_when: false

    - name: Show systemd state
      ansible.builtin.debug:
        msg: "{{ sysd.stdout | trim }}"

    - name: Gather the package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Get chronny major version
      ansible.builtin.set_fact:
        chrony_major_version: "{{ ansible_facts.packages['chrony'][0].version | split('.') | first | int }}"

    - name: Check if configuration is valid
      when: chrony_major_version | int(1) >= 4
      block:
        - name: Check if configuration is ok
          ansible.builtin.command: chronyd -p
          changed_when: false
          register: chrony_result

        - name: Show output of chronyd -p command
          ansible.builtin.debug:
            msg: "{{ chrony_result }}"
