---
- name: Detect systemd entrypoint paths inside running containers
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Detect systemd path in each container (prefers /lib, then /usr/lib, then /sbin/init)
      containers.podman.podman_container_exec:
        name: "{{ item }}"
        argv:
          - /bin/sh
          - -c
          - >
            if [ -x /lib/systemd/systemd ]; then echo /lib/systemd/systemd;
            elif [ -x /usr/lib/systemd/systemd ]; then echo /usr/lib/systemd/systemd;
            elif [ -x /sbin/init ]; then echo /sbin/init;
            else echo ""; fi
      register: _systemd_detect
      loop: "{{ groups.get('molecule', []) }}"
      changed_when: false
      failed_when: (_systemd_detect.stdout | default('') | trim | length) == 0
      # podman_container_exec runs a command inside a running container. [2](https://docs.ansible.com/projects/ansible/latest/collections/containers/podman/podman_container_exec_module.html)[3](https://docs.podman.io/en/latest/markdown/podman-exec.1.html)

    - name: Build a map of container -> systemd entrypoint
      ansible.builtin.set_fact:
        systemd_entrypoint_map: "{{ systemd_entrypoint_map | default({}) | combine({ item.item: (item.stdout | trim) }) }}"
      loop: "{{ _systemd_detect.results }}"
      changed_when: false

- name: Recreate containers with systemd as PID1
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Recreate containers with detected systemd entrypoint
      containers.podman.podman_container:
        name: "{{ item }}"
        hostname: "{{ item }}"
        image: "localhost/molecule-systemd-{{ item }}:latest"
        command: "{{ systemd_entrypoint_map[item] }}"
        privileged: true
        volume:
          - /sys/fs/cgroup:/sys/fs/cgroup:ro
        tmpfs:
          /run: "rw"
          /tmp: "rw"
        state: started
        recreate: true
      loop: "{{ groups.get('molecule', []) }}"
      # podman_container manages container lifecycle; tmpfs is supported by the module. [4](https://www.releases.ubuntu.com/)[5](https://linuxsecurity.com/advisories/fedora)
